version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: visioncare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: visioncare
      POSTGRES_PASSWORD: visioncare
      POSTGRES_DB: visioncare
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visioncare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: visioncare_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://visioncare:visioncare@db:5432/visioncare
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-please}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: visioncare_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: visioncare_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
